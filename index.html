<!DOCTYPE html>
<html lang="th" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แอปบันทึกและเบิกจ่ายเงิน (Cloud Sync)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'Sarabun', 'sans-serif'], } } } }
  </script>

  <style>
    body { -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease, color 0.3s ease; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#0D0F14] dark:text-gray-100 min-h-screen font-sans flex flex-col pb-12">

  <header class="sticky top-0 z-30 bg-white/80 dark:bg-[#0D0F14]/80 backdrop-blur-md border-b border-slate-200/50 dark:border-gray-800/50 px-4 py-3 transition-colors">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20 text-white">
          <i data-lucide="wallet" class="w-5 h-5"></i>
        </div>
        <div>
          <h1 class="text-sm font-extrabold text-slate-800 dark:text-white leading-tight">ระบบเบิกจ่ายคลาวด์</h1>
          <div class="flex items-center gap-1.5 mt-0.5">
            <span id="syncStatusBadge" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
            <span id="syncStatusText" class="text-[10px] font-bold text-slate-500 dark:text-gray-400">กำลังตรวจสอบ...</span>
          </div>
        </div>
      </div>
      <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-gray-800 text-slate-600 dark:text-gray-300"><i id="themeIcon" data-lucide="sun" class="w-4 h-4"></i></button>
    </div>
  </header>

  <main class="flex-1 w-full max-w-md mx-auto px-4 mt-6">
    <section class="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-3xl p-6 text-white shadow-xl mb-6">
      <p class="text-xs font-semibold uppercase tracking-wider text-emerald-100">รวมค่าใช้จ่ายทั้งหมด</p>
      <h2 id="totalBalanceText" class="text-3xl font-black mt-1">฿0.00</h2>
    </section>

    <div class="flex bg-slate-100 dark:bg-gray-800 p-1.5 rounded-2xl mb-6">
      <button id="tab-add" onclick="switchTab('add')" class="flex-1 py-3 text-[11px] font-black rounded-xl bg-white dark:bg-[#1A1C24] shadow-sm">บันทึก</button>
      <button id="tab-history" onclick="switchTab('history')" class="flex-1 py-3 text-[11px] font-black rounded-xl text-slate-500">คลังประวัติ</button>
      <button id="tab-stats" onclick="switchTab('stats')" class="flex-1 py-3 text-[11px] font-black rounded-xl text-slate-500">สถิติ</button>
    </div>

    <!-- หน้าบันทึก -->
    <div id="content-add" class="space-y-6">
      <section class="bg-white dark:bg-[#13151C] border p-5 rounded-3xl">
        <h3 id="formTitle" class="text-sm font-extrabold mb-4">บันทึกรายการใหม่</h3>
        <form id="expenseForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
             <input type="date" id="dateInput" required class="bg-slate-50 dark:bg-[#1A1C24] border rounded-xl p-3 text-xs font-bold">
             <input type="time" id="timeInput" required class="bg-slate-50 dark:bg-[#1A1C24] border rounded-xl p-3 text-xs font-bold">
          </div>
          <div class="flex gap-2">
            <select id="categoryInput" required class="w-full bg-slate-50 dark:bg-[#1A1C24] border rounded-xl p-3 text-xs font-bold"></select>
            <button type="button" onclick="openManageCategoriesModal()" class="bg-slate-100 dark:bg-gray-800 p-3 rounded-xl"><i data-lucide="settings" class="w-4 h-4"></i></button>
          </div>
          <input type="text" id="descInput" required placeholder="รายละเอียด" class="w-full bg-slate-50 dark:bg-[#1A1C24] border rounded-xl p-3 text-xs">
          <input type="number" id="amountInput" required placeholder="จำนวนเงิน" class="w-full bg-slate-50 dark:bg-[#1A1C24] border rounded-xl p-3 text-xs font-black">
          <button type="submit" id="submitBtn" class="w-full bg-emerald-500 text-white font-black text-xs py-4 rounded-xl">บันทึกข้อมูล</button>
        </form>
      </section>
      <div id="recentExpensesContainer" class="space-y-2"></div>
    </div>

    <!-- หน้าประวัติ -->
    <div id="content-history" class="hidden space-y-4">
      <div id="monthChipsContainer" class="flex gap-2 overflow-x-auto scrollbar-hide py-1"></div>
      <div id="historyExpensesContainer" class="space-y-2"></div>
    </div>

    <!-- หน้าสถิติ -->
    <div id="content-stats" class="hidden space-y-4">
        <div class="bg-white dark:bg-[#13151C] p-4 rounded-3xl space-y-3">
            <select id="statsFilterCategory" onchange="renderStatsView()" class="w-full p-2 border rounded-xl text-xs"></select>
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="statsStartDate" onchange="renderStatsView()" class="p-2 border rounded-xl text-xs">
                <input type="date" id="statsEndDate" onchange="renderStatsView()" class="p-2 border rounded-xl text-xs">
            </div>
        </div>
        <div id="chartDonut" class="w-44 h-44 rounded-full mx-auto" style="background: conic-gradient(#ccc 0% 100%)"></div>
        <div id="chartLegendContainer" class="space-y-2"></div>
    </div>
  </main>

  <!-- หน้าต่างจัดการหมวดหมู่ -->
  <div id="manageCategoriesModal" class="fixed inset-0 z-50 bg-black/60 hidden items-center justify-center p-4">
    <div class="bg-white dark:bg-[#13151C] p-6 rounded-3xl w-full max-w-sm space-y-4">
        <h4 class="text-sm font-bold">จัดการหมวดหมู่</h4>
        <div id="categoriesListContainer" class="max-h-60 overflow-y-auto space-y-2"></div>
        <button onclick="toggleAddCategoryModal(true)" class="w-full bg-emerald-500 text-white py-3 rounded-xl text-xs">เพิ่มหมวดหมู่ใหม่</button>
    </div>
  </div>

  <div id="toastContainer" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script>
    const DEMO_KEY = "expense_tracker_demo_data";
    const DEFAULT_CATEGORIES = {
      "อาหาร": { emoji: "🍱", hex: "#f59e0b" },
      "เดินทาง": { emoji: "🚗", hex: "#3b82f6" },
      "อื่นๆ": { emoji: "🪙", hex: "#64748b" }
    };

    let expenses = [];
    let customCategories = JSON.parse(localStorage.getItem('expense_custom_categories')) || {};
    let CATEGORY_STYLES = { ...DEFAULT_CATEGORIES, ...customCategories };
    let editingId = null;
    let selectedMonth = "";

    window.addEventListener('DOMContentLoaded', () => {
        populateCategorySelects();
        fetchExpensesFromCloud();
        document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
        const now = new Date();
        document.getElementById('timeInput').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        lucide.createIcons();
    });

    function renderDataAndStats() {
        // แก้ไขให้เรียกทุกฟังก์ชันที่จำเป็น
        renderRecentExpenses();
        calculateGlobalDashboard();
        
        // กำหนดเดือนเริ่มต้นหากยังไม่มี
        if(!selectedMonth && expenses.length > 0) {
            const sorted = [...expenses].sort((a,b) => b.date.localeCompare(a.date));
            selectedMonth = sorted[0].date.substring(0,7);
        }
        
        renderMonthlyChips();
        renderHistoryView();
        renderStatsView();
    }

    function renderRecentExpenses() {
        const container = document.getElementById('recentExpensesContainer');
        container.innerHTML = expenses.slice(0, 5).map(e => generateExpenseRowHtml(e)).join('');
    }

    function renderHistoryView() {
        const container = document.getElementById('historyExpensesContainer');
        if(!container) return;
        const filtered = expenses.filter(e => e.date && e.date.substring(0,7) === selectedMonth);
        container.innerHTML = filtered.map(e => generateExpenseRowHtml(e)).join('');
        lucide.createIcons();
    }

    function renderStatsView() {
        const container = document.getElementById('chartLegendContainer');
        const catFilter = document.getElementById('statsFilterCategory').value;
        const start = document.getElementById('statsStartDate').value;
        const end = document.getElementById('statsEndDate').value;
        
        let filtered = expenses.filter(e => {
            const m = (catFilter === "ทั้งหมด" || e.category === catFilter);
            const d = (!start || e.date >= start) && (!end || e.date <= end);
            return m && d;
        });

        const sums = {};
        filtered.forEach(e => sums[e.category] = (sums[e.category] || 0) + parseFloat(e.amount || 0));
        
        container.innerHTML = Object.keys(sums).map(cat => `
            <div class="flex justify-between text-xs p-2 border rounded-xl">
                <span>${CATEGORY_STYLES[cat]?.emoji || '🏷️'} ${cat}</span>
                <span class="font-bold">฿${sums[cat].toLocaleString()}</span>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function generateExpenseRowHtml(e) {
        const s = CATEGORY_STYLES[e.category] || CATEGORY_STYLES["อื่นๆ"];
        return `
            <div class="flex items-center justify-between p-3 border rounded-xl bg-white text-xs">
                <div>${s.emoji} ${e.description}</div>
                <div class="font-black">฿${parseFloat(e.amount).toLocaleString()}</div>
            </div>`;
    }

    // ฟังก์ชันอื่นๆ ที่จำเป็น... (คงโครงสร้างเดิมจากเวอร์ชันก่อนที่ทำงานได้ดีไว้)
    function populateCategorySelects() {
        const catInput = document.getElementById('categoryInput');
        const statsFilter = document.getElementById('statsFilterCategory');
        const keys = Object.keys(CATEGORY_STYLES).filter(k => k !== 'อื่นๆ');
        let html = '';
        keys.forEach(k => html += `<option value="${k}">${CATEGORY_STYLES[k].emoji} ${k}</option>`);
        html += `<option value="อื่นๆ">${CATEGORY_STYLES['อื่นๆ'].emoji} อื่นๆ</option>`;
        
        if(catInput) catInput.innerHTML = html;
        if(statsFilter) statsFilter.innerHTML = '<option value="ทั้งหมด">ทั้งหมด</option>' + html;
    }

    function switchTab(tab) {
        ['add','history','stats'].forEach(t => {
            document.getElementById(`content-${t}`).classList.toggle('hidden', t !== tab);
        });
        if(tab === 'stats') renderStatsView();
    }
  </script>
</body>
</html>

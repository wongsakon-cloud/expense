<!DOCTYPE html>
<html lang="th" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แอปบันทึกและเบิกจ่ายเงิน (Cloud Sync)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'Sarabun', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      background: transparent;
      bottom: 0;
      color: transparent;
      cursor: pointer;
      left: 0;
      position: absolute;
      right: 0;
      top: 0;
      width: auto;
      height: auto;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#0B0C10] dark:text-gray-200 min-h-screen pb-24 font-sans antialiased">

  <div class="max-w-md mx-auto px-4 pt-4 space-y-4">
    
    <header class="flex justify-between items-center bg-white dark:bg-[#13151C] border border-slate-200/60 dark:border-gray-800/50 p-4 rounded-3xl shadow-sm">
      <div class="flex items-center gap-2.5">
        <div class="w-10 h-10 bg-purple-600 rounded-2xl flex items-center justify-center text-white shadow-md shadow-purple-500/20">
          <i data-lucide="wallet" class="w-5 h-5"></i>
        </div>
        <div>
          <h1 class="text-xs font-black tracking-wide text-slate-400 uppercase">Personal Finance</h1>
          <p class="text-sm font-black text-slate-800 dark:text-white">บันทึกรายจ่าย & เบิกเงิน</p>
        </div>
      </div>
      <button onclick="toggleTheme()" class="w-10 h-10 bg-slate-100 dark:bg-[#1A1C24] border border-slate-200/40 dark:border-gray-800 rounded-2xl flex items-center justify-center hover:scale-95 transition-all">
        <i id="themeIcon" data-lucide="moon" class="w-4 h-4 text-slate-600 dark:text-yellow-400"></i>
      </button>
    </header>

    <div id="content-input" class="space-y-4">
      <section class="bg-white dark:bg-[#13151C] border border-slate-200/60 dark:border-gray-800/50 p-5 rounded-3xl shadow-sm space-y-4">
        <h2 class="text-sm font-extrabold flex items-center gap-2 text-slate-800 dark:text-white">
          <span class="w-2 h-4 bg-purple-600 rounded"></span> เพิ่มรายการใหม่
        </h2>
        
        <div class="space-y-3">
          <div>
            <label class="text-[10px] font-bold text-slate-400 dark:text-gray-400 uppercase tracking-wider mb-1 block">จำนวนเงิน (บาท)</label>
            <input type="number" id="amountInput" placeholder="0.00" class="w-full bg-slate-50 dark:bg-[#1A1C24] border border-slate-200 dark:border-gray-800 rounded-2xl px-4 py-3 text-lg font-black outline-none focus:border-purple-500 transition-all">
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[10px] font-bold text-slate-400 dark:text-gray-400 uppercase tracking-wider mb-1 block">หมวดหมู่</label>
              <select id="categoryInput" class="w-full bg-slate-50 dark:bg-[#1A1C24] border border-slate-200 dark:border-gray-800 rounded-2xl px-3 py-3 text-xs font-bold outline-none appearance-none">
                </select>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 dark:text-gray-400 uppercase tracking-wider mb-1 block">วันที่</label>
              <div class="relative">
                <input type="date" id="dateInput" class="w-full bg-slate-50 dark:bg-[#1A1C24] border border-slate-200 dark:border-gray-800 rounded-2xl px-3 py-3 text-xs font-bold outline-none">
              </div>
            </div>
          </div>

          <div>
            <label class="text-[10px] font-bold text-slate-400 dark:text-gray-400 uppercase tracking-wider mb-1 block">หมายเหตุ / รายละเอียด</label>
            <input type="text" id="noteInput" placeholder="ระบุรายละเอียดเพิ่มเติม..." class="w-full bg-slate-50 dark:bg-[#1A1C24] border border-slate-200 dark:border-gray-800 rounded-2xl px-4 py-3 text-xs font-medium outline-none">
          </div>

          <button onclick="addExpense()" class="w-full bg-purple-600 hover:bg-purple-700 active:scale-[0.99] text-white font-bold py-3.5 rounded-2xl transition-all shadow-lg shadow-purple-500/10 text-xs flex items-center justify-center gap-2 mt-2">
            <i data-lucide="plus-circle" class="w-4 h-4"></i> บันทึกรายการ
          </button>
        </div>
      </section>

      <section class="bg-white dark:bg-[#13151C] border border-slate-200/60 dark:border-gray-800/50 p-5 rounded-3xl shadow-sm">
        <h3 class="text-xs font-extrabold text-slate-400 uppercase tracking-wider mb-3">รายการล่าสุดของวันนี้</h3>
        <div id="recentExpensesList" class="space-y-2">
          </div>
      </section>
    </div>

    <div id="content-history" class="hidden space-y-4">
      <div class="bg-white dark:bg-[#13151C] border border-slate-200/60 dark:border-gray-800/50 p-4 rounded-3xl shadow-sm flex items-center justify-between">
        <h2 class="text-sm font-extrabold text-slate-800 dark:text-white">ประวัติทั้งหมด</h2>
        <select id="filterCategory" onchange="renderMonthlyHistoryView()" class="bg-slate-50 dark:bg-[#1A1C24] border border-slate-200 dark:border-gray-800 rounded-xl px-3 py-1.5 text-xs font-bold outline-none">
          </select>
      </div>
      <div id="monthlyHistoryContainer" class="space-y-4">
        </div>
    </div>

    <div id="content-stats" class="hidden space-y-4">
      
      <div class="bg-white dark:bg-[#13151C] border border-slate-200/60 dark:border-gray-800/50 p-4 rounded-3xl shadow-sm space-y-3">
        <h3 class="text-xs font-extrabold flex items-center gap-2 mb-1 text-slate-700 dark:text-gray-300">
          <i data-lucide="filter" class="w-3.5 h-3.5 text-purple-500"></i> กรองข้อมูลสถิติ
        </h3>
        
        <div class="flex gap-2">
          <div class="flex-1">
            <label class="text-[10px] font-bold text-slate-400 dark:text-gray-500 mb-1 block">หมวดหมู่</label>
            <select id="statsCategoryFilter" onchange="renderStats()" class="w-full bg-slate-50 dark:bg-[#1A1C24] border border-slate-200 dark:border-gray-800 rounded-xl px-3 py-2 text-xs font-bold outline-none shadow-sm">
              </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[10px] font-bold text-slate-400 dark:text-gray-500 mb-1 block">ตั้งแต่วันที่</label>
            <input type="date" id="statsStartDate" onchange="renderStats()" class="w-full bg-slate-50 dark:bg-[#1A1C24] border border-slate-200 dark:border-gray-800 rounded-xl px-3 py-2 text-xs font-bold outline-none">
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-400 dark:text-gray-500 mb-1 block">ถึงวันที่</label>
            <input type="date" id="statsEndDate" onchange="renderStats()" class="w-full bg-slate-50 dark:bg-[#1A1C24] border border-slate-200 dark:border-gray-800 rounded-xl px-3 py-2 text-xs font-bold outline-none">
          </div>
        </div>
      </div>

      <section class="bg-white dark:bg-[#13151C] border border-slate-200/60 dark:border-gray-800/50 p-5 rounded-3xl shadow-sm">
        <h3 class="text-sm font-extrabold flex items-center gap-2 mb-4 text-slate-800 dark:text-white">
          <span class="w-2 h-4 bg-purple-500 rounded"></span> สรุปสัดส่วนรายจ่าย
        </h3>

        <div class="flex flex-col items-center justify-center py-4">
          <div id="chartDonut" class="w-44 h-44 rounded-full shadow-inner relative flex items-center justify-center transition-all duration-500" style="background: conic-gradient(#e2e8f0 0% 100%)">
            <div class="w-32 h-32 bg-white dark:bg-[#13151C] rounded-full flex flex-col items-center justify-center shadow-md">
              <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">ยอดรวมที่เลือก</span>
              <span id="chartCenterSum" class="text-base font-black text-slate-800 dark:text-white mt-0.5">฿0.00</span>
            </div>
          </div>
        </div>

        <div id="chartLegendContainer" class="space-y-2 mt-4">
          </div>
      </section>
    </div>

  </div>

  <nav class="fixed bottom-4 left-4 right-4 max-w-md mx-auto bg-white/90 dark:bg-[#13151C]/90 backdrop-blur-xl border border-slate-200/60 dark:border-gray-800/60 p-2 rounded-2xl shadow-xl flex gap-1 z-50">
    <button onclick="switchTab('input')" id="btn-tab-input" class="flex-1 py-3 text-[11px] font-black rounded-xl transition-all flex items-center justify-center gap-1.5 bg-slate-900 text-white dark:bg-white dark:text-slate-900 shadow-sm">
      <i data-lucide="plus-circle" class="w-4 h-4"></i> บันทึก
    </button>
    <button onclick="switchTab('history')" id="btn-tab-history" class="flex-1 py-3 text-[11px] font-black rounded-xl transition-all flex items-center justify-center gap-1.5 text-slate-500 dark:text-gray-400 hover:bg-slate-100 dark:hover:bg-gray-800/50">
      <i data-lucide="calendar" class="w-4 h-4"></i> ประวัติ
    </button>
    <button onclick="switchTab('stats')" id="btn-tab-stats" class="flex-1 py-3 text-[11px] font-black rounded-xl transition-all flex items-center justify-center gap-1.5 text-slate-500 dark:text-gray-400 hover:bg-slate-100 dark:hover:bg-gray-800/50">
      <i data-lucide="pie-chart" class="w-4 h-4"></i> สถิติ
    </button>
  </nav>

  <script>
    // สไตล์และสีสัญลักษณ์ประจำหมวดหมู่
    const CATEGORY_STYLES = {
      'อาหารและเครื่องดื่ม': { emoji: '🍔', hex: '#EF4444' },
      'เดินทาง/น้ำมัน': { emoji: '🚗', hex: '#3B82F6' },
      'ที่พักอาศัย/ค่าไฟ': { emoji: '🏠', hex: '#10B981' },
      'ช้อปปิ้ง': { emoji: '🛍️', hex: '#EC4899' },
      'ความบันเทิง': { emoji: '🎉', hex: '#F59E0B' },
      'เบิกจ่ายงาน/สำนักงาน': { emoji: '🏢', hex: '#8B5CF6' },
      'อื่นๆ': { emoji: '📦', hex: '#64748B' }
    };

    // โครงสร้างฐานข้อมูลรายการเบิกจ่าย (ดึงจาก LocalStorage)
    let expenses = JSON.parse(localStorage.getItem('wallet_expenses')) || [
      { id: 1, amount: 120, category: 'อาหารและเครื่องดื่ม', date: new Date().toISOString().split('T')[0], note: 'ข้าวเที่ยง' },
      { id: 2, amount: 500, category: 'เดินทาง/น้ำมัน', date: new Date().toISOString().split('T')[0], note: 'เติมน้ำมันรถ' }
    ];

    window.addEventListener('DOMContentLoaded', () => {
      initTheme();
      populateCategorySelects();
      initStatsDefaultDates();
      setCurrentDate();
      renderAll();
      lucide.createIcons();
    });

    // คอนฟิกค่าเริ่มต้นของตัวกรองสถิติ (ค่าเริ่มต้นเป็นทุกยอดของเดือนปัจจุบัน)
    function initStatsDefaultDates() {
      const today = new Date();
      const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
      const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0).toISOString().split('T')[0];
      
      const startDateInput = document.getElementById('statsStartDate');
      const endDateInput = document.getElementById('statsEndDate');
      
      if (startDateInput) startDateInput.value = firstDay;
      if (endDateInput) endDateInput.value = lastDay;
    }

    function setCurrentDate() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('dateInput').value = today;
    }

    // จัดการธีมแสดงผล
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('themeIcon').setAttribute('data-lucide', 'sun');
      } else {
        document.documentElement.classList.remove('dark');
        document.getElementById('themeIcon').setAttribute('data-lucide', 'moon');
      }
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
      lucide.createIcons();
    }

    // ควบคุมระบบการสลับหน้าแท็บ
    function switchTab(tab) {
      const tabs = ['input', 'history', 'stats'];
      tabs.forEach(t => {
        const btn = document.getElementById(`btn-tab-${t}`);
        const content = document.getElementById(`content-${t}`);
        if (t === tab) {
          btn.className = "flex-1 py-3 text-[11px] font-black rounded-xl transition-all flex items-center justify-center gap-1.5 bg-slate-900 text-white dark:bg-white dark:text-slate-900 shadow-sm";
          content.classList.remove('hidden');
        } else {
          btn.className = "flex-1 py-3 text-[11px] font-black rounded-xl transition-all flex items-center justify-center gap-1.5 text-slate-500 dark:text-gray-400 hover:bg-slate-100 dark:hover:bg-gray-800/50";
          content.classList.add('hidden');
        }
      });

      if (tab === 'history') renderMonthlyHistoryView();
      if (tab === 'stats') renderStats();
    }

    // กระจายตัวเลือกหมวดหมู่ไปยัง Dropdown ต่างๆ
    function populateCategorySelects() {
      const catInput = document.getElementById('categoryInput');
      const filterInput = document.getElementById('filterCategory');
      const statsFilterInput = document.getElementById('statsCategoryFilter');
      
      let optionsHTML = '';
      let filterHTML = '<option value="ทั้งหมด">ทุกหมวดหมู่</option>';

      Object.keys(CATEGORY_STYLES).forEach(k => {
        const str = `<option value="${k}">${CATEGORY_STYLES[k].emoji} ${k}</option>`;
        optionsHTML += str;
        filterHTML += str;
      });

      if(catInput) catInput.innerHTML = optionsHTML;
      if(filterInput) filterInput.innerHTML = filterHTML;
      if(statsFilterInput) statsFilterInput.innerHTML = filterHTML;
    }

    // ฟังก์ชันบันทึกข้อมูลเบิกจ่ายใหม่
    function addExpense() {
      const amount = parseFloat(document.getElementById('amountInput').value);
      const category = document.getElementById('categoryInput').value;
      const date = document.getElementById('dateInput').value;
      const note = document.getElementById('noteInput').value.trim();

      if (!amount || amount <= 0) {
        alert('กรุณากรอกจำนวนเงินที่ถูกต้อง');
        return;
      }
      if (!date) {
        alert('กรุณาเลือกวันที่บันทึก');
        return;
      }

      const newRecord = { id: Date.now(), amount, category, date, note };
      expenses.unshift(newRecord);
      saveData();
      
      // ล้างข้อมูลฟอร์มหลังบันทึกเสร็จสิ้น
      document.getElementById('amountInput').value = '';
      document.getElementById('noteInput').value = '';
      setCurrentDate();
      
      renderAll();
      alert('บันทึกรายการสำเร็จ');
    }

    function deleteExpense(id) {
      if (confirm('ยืนยันที่จะลบรายการนี้หรือไม่?')) {
        expenses = expenses.filter(exp => exp.id !== id);
        saveData();
        renderAll();
      }
    }

    function saveData() {
      localStorage.setItem('wallet_expenses', JSON.stringify(expenses));
    }

    function renderAll() {
      renderRecentExpenses();
      renderMonthlyHistoryView();
      renderStats();
    }

    // แสดงรายการล่าสุดของวันปัจจุบันในแท็บหน้าหลัก
    function renderRecentExpenses() {
      const container = document.getElementById('recentExpensesList');
      if (!container) return;

      const today = new Date().toISOString().split('T')[0];
      const todayExpenses = expenses.filter(exp => exp.date === today);

      if (todayExpenses.length === 0) {
        container.innerHTML = `<p class="text-center text-xs text-slate-400 py-4 font-medium">ยังไม่มีรายการบันทึกของวันนี้</p>`;
        return;
      }

      container.innerHTML = todayExpenses.map(exp => {
        const style = CATEGORY_STYLES[exp.category] || CATEGORY_STYLES['อื่นๆ'];
        return `
          <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-[#1A1C24] rounded-2xl border border-slate-100 dark:border-gray-800/60">
            <div class="flex items-center gap-2.5">
              <span class="text-lg">${style.emoji}</span>
              <div>
                <p class="text-xs font-bold text-slate-700 dark:text-gray-200">${exp.category}</p>
                ${exp.note ? `<p class="text-[10px] font-medium text-slate-400">${exp.note}</p>` : ''}
              </div>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-xs font-black text-slate-800 dark:text-white">฿${exp.amount.toLocaleString()}</span>
              <button onclick="deleteExpense(${exp.id})" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
            </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    // แปลงรูปแบบวันที่เป็นไทยย่อ
    function formatDateThai(dateStr) {
      if (!dateStr) return "";
      const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
      const p = dateStr.split('-');
      if (p.length !== 3) return dateStr;
      return `${parseInt(p[2])} ${months[parseInt(p[1]) - 1]} ${parseInt(p[0]) + 543}`;
    }

    // แสดงประวัติสรุปเป็นรายเดือนแยกส่วนในหน้าประวัติ
    function renderMonthlyHistoryView() {
      const container = document.getElementById('monthlyHistoryContainer');
      const filterCat = document.getElementById('filterCategory')?.value || "ทั้งหมด";
      if (!container) return;

      let filtered = expenses;
      if (filterCat !== "ทั้งหมด") {
        filtered = expenses.filter(exp => exp.category === filterCat);
      }

      if (filtered.length === 0) {
        container.innerHTML = `<p class="text-center text-xs text-slate-400 py-8">ไม่พบประวัติรายการที่ค้นหา</p>`;
        return;
      }

      // จัดกลุ่มข้อมูลแยกตามปีและเดือน
      const groups = {};
      filtered.forEach(exp => {
        const parts = exp.date.split('-');
        const monthKey = `${parts[0]}-${parts[1]}`;
        if (!groups[monthKey]) groups[monthKey] = [];
        groups[monthKey].push(exp);
      });

      const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
      let html = '';

      Object.keys(groups).sort((a, b) => b.localeStorage - a.localeStorage).forEach(monthKey => {
        const items = groups[monthKey];
        const [year, month] = monthKey.split('-');
        const headerTitle = `${thaiMonths[parseInt(month) - 1]} ${parseInt(year) + 543}`;
        const monthlySum = items.reduce((sum, item) => sum + parseFloat(item.amount), 0);

        let itemsHTML = items.map(exp => {
          const style = CATEGORY_STYLES[exp.category] || CATEGORY_STYLES['อื่นๆ'];
          return `
            <div class="flex items-center justify-between p-3 bg-white dark:bg-[#13151C] border border-slate-100 dark:border-gray-800/40 rounded-2xl">
              <div class="flex items-center gap-2.5">
                <span class="text-base">${style.emoji}</span>
                <div>
                  <div class="flex items-center gap-1.5">
                    <p class="text-xs font-bold text-slate-700 dark:text-gray-200">${exp.category}</p>
                    <span class="text-[9px] font-semibold bg-slate-100 dark:bg-gray-800 px-1.5 py-0.5 rounded text-slate-400">${formatDateThai(exp.date)}</span>
                  </div>
                  ${exp.note ? `<p class="text-[10px] font-medium text-slate-400 mt-0.5">${exp.note}</p>` : ''}
                </div>
              </div>
              <div class="flex items-center gap-2.5">
                <span class="text-xs font-black text-slate-800 dark:text-white">฿${exp.amount.toLocaleString()}</span>
                <button onclick="deleteExpense(${exp.id})" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
              </div>
            </div>
          `;
        }).join('');

        html += `
          <div class="space-y-2">
            <div class="flex justify-between items-center px-1">
              <h3 class="text-xs font-black text-slate-400 uppercase tracking-wide">${headerTitle}</h3>
              <span class="text-xs font-black text-purple-600 dark:text-purple-400">รวม ฿${monthlySum.toLocaleString()}</span>
            </div>
            <div class="space-y-1.5">${itemsHTML}</div>
          </div>
        `;
      });

      container.innerHTML = html;
      lucide.createIcons();
    }

    // ฟังก์ชันคำนวณและประมวลผลหน้าสถิติใหม่ (ตามที่สั่งปรับปรุงทั้งหมด)
    function renderStats() {
      const categoryFilter = document.getElementById('statsCategoryFilter')?.value || "ทั้งหมด";
      const startDate = document.getElementById('statsStartDate')?.value;
      const endDate = document.getElementById('statsEndDate')?.value;
      
      // 1. กรองข้อมูลตามขอบเขต (หมวดหมู่ และ ช่วงวันที่ระบุ)
      let filteredExpenses = expenses.filter(exp => {
        let isMatch = true;
        if (categoryFilter !== "ทั้งหมด" && exp.category !== categoryFilter) isMatch = false;
        if (startDate && exp.date < startDate) isMatch = false;
        if (endDate && exp.date > endDate) isMatch = false;
        return isMatch;
      });

      // 2. สรุปคำนวณแจกแจงแยกหมวดหมู่
      let categoryTotals = {};
      let totalSum = 0;
      
      filteredExpenses.forEach(exp => {
        const cat = exp.category || 'อื่นๆ';
        if (!categoryTotals[cat]) categoryTotals[cat] = 0;
        categoryTotals[cat] += parseFloat(exp.amount);
        totalSum += parseFloat(exp.amount);
      });

      document.getElementById('chartCenterSum').innerText = `฿${totalSum.toLocaleString('th-TH', {minimumFractionDigits: 2})}`;

      const chartLegendContainer = document.getElementById('chartLegendContainer');
      const chartDonut = document.getElementById('chartDonut');

      if (totalSum === 0) {
        chartDonut.style.background = 'conic-gradient(#e2e8f0 0% 100%)';
        chartLegendContainer.innerHTML = '<p class="text-center text-xs text-slate-400 py-8 font-medium">ไม่มีข้อมูลรายจ่ายในช่วงเงื่อนไขที่เลือก</p>';
        return;
      }

      // 3. วาดกราฟวงกลมจำลอง (Conic Gradient) และสร้างการ์ดข้อมูลสรุปที่เข้าใจง่าย
      let conicGradientParts = [];
      let currentPercentage = 0;
      let legendHTML = '';

      // เรียงลำดับจากหมวดหมู่ที่ใช้จ่ายมากที่สุดไปหาน้อยที่สุด
      const sortedCats = Object.keys(categoryTotals).sort((a, b) => categoryTotals[b] - categoryTotals[a]);

      sortedCats.forEach(cat => {
        const amount = categoryTotals[cat];
        const percentage = (amount / totalSum) * 100;
        const style = CATEGORY_STYLES[cat] || CATEGORY_STYLES['อื่นๆ'];
        const hexColor = style.hex || '#64748b';

        conicGradientParts.push(`${hexColor} ${currentPercentage}% ${currentPercentage + percentage}%`);
        currentPercentage += percentage;

        // รูปแบบการ์ดรายการสถิติแนวตั้งแบบใหม่ (ทำความเข้าใจง่ายกระชับ ชัดเจน)
        legendHTML += `
          <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-[#1A1C24] rounded-2xl border border-slate-100 dark:border-gray-800/60 transition-all hover:scale-[1.01]">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded-xl flex items-center justify-center text-base shadow-sm" style="background-color: ${hexColor}15; color: ${hexColor}; border: 1px solid ${hexColor}25;">
                ${style.emoji}
              </div>
              <div>
                <p class="text-[11.5px] font-bold text-slate-700 dark:text-gray-200">${cat}</p>
                <p class="text-[10px] font-semibold text-slate-400">${percentage.toFixed(1)}% ของยอดรวมทั้งหมด</p>
              </div>
            </div>
            <p class="text-xs font-black text-slate-800 dark:text-white">
              ฿${amount.toLocaleString('th-TH', {minimumFractionDigits: 2})}
            </p>
          </div>
        `;
      });

      chartDonut.style.background = `conic-gradient(${conicGradientParts.join(', ')})`;
      chartLegendContainer.innerHTML = legendHTML;
    }
  </script>
</body>
</html>
